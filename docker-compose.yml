version: '3.8'
services:
  backend:
    image: ghcr.io/holhare/mogala/backend:latest
    container_name: mogala-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=production
      - DB_HOST=mogala-mysql
      - DB_USER=mogala_user
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=mogala
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql
    networks:
      - mogala-net

  frontend:
    image: ghcr.io/holhare/mogala/frontend:latest
    container_name: mogala-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mogala-net

  kamailio:
    image: ghcr.io/holhare/mogala/kamailio:latest
    container_name: mogala-kamailio
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      - mysql
      - rtpproxy
    networks:
      - mogala-net

  rtpproxy:
    image: sippylabs/rtpproxy:latest
    container_name: mogala-rtpproxy
    restart: unless-stopped
    network_mode: host
    command: -F -s udp:172.18.0.1:7722 -l 173.249.4.136 -m 10200 -M 10400

  asterisk:
    image: ghcr.io/holhare/mogala/asterisk:latest
    container_name: mogala-asterisk
    restart: unless-stopped
    ports:
      - "5062:5061/udp"
      - "5062:5061/tcp"
      - "8088:8088/tcp"
      - "10000-10100:10000-10100/udp"
    environment:
      - EXTERNAL_IP=${EXTERNAL_IP}
    depends_on:
      - kamailio
    networks:
      - mogala-net

  mysql:
    image: mysql:8
    container_name: mogala-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mogala
      MYSQL_USER: mogala_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mogala-net
    ports:
      - "3306:3306"

networks:
  mogala-net:
    driver: bridge

volumes:
  mysql_data:
