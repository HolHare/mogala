version: '3.8'
services:
  backend:
    image: ghcr.io/holhare/mogala/backend:latest
    container_name: mogala-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=production
      - DB_HOST=mogala-mysql
      - DB_USER=mogala_user
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=mogala
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql
    networks:
      - mogala-net
  frontend:
    image: ghcr.io/holhare/mogala/frontend:latest
    container_name: mogala-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mogala-net
  mysql:
    image: mysql:8
    container_name: mogala-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mogala
      MYSQL_USER: mogala_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mogala-net
    ports:
      - "3306:3306"
networks:
  mogala-net:
    driver: bridge
volumes:
  mysql_data:
