#!KAMAILIO

#!subst "/DBURL/mysql:\/\/mogala_user:DBPASS@mogala-mysql\/mogala/"

####### Global Parameters #########
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=yes
children=4

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

####### Modules Section ########
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "db_mysql.so"
loadmodule "nathelper.so"
loadmodule "rtpproxy.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"

####### Module Parameters ########
modparam("usrloc", "db_url", "DBURL")
modparam("usrloc", "db_mode", 2)
modparam("usrloc", "use_domain", 0)

modparam("auth_db", "db_url", "DBURL")
modparam("auth_db", "password_column", "sip_password")
modparam("auth_db", "load_credentials", "")
modparam("auth_db", "user_column", "extension")
modparam("auth_db", "domain_column", "tenant_id")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "use_domain", 0)

modparam("nathelper", "received_avp", "$avp(RECEIVED)")
modparam("rtpproxy", "rtpproxy_sock", "udp:172.18.0.1:7722")
modparam("rr", "enable_full_lr", 1)
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)
modparam("websocket", "sub_protocols", 1)

####### Routing Logic ########
request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200","Keepalive");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("Malformed SIP message from $si:$sp\n");
        exit;
    }

    if (is_method("NOTIFY|SUBSCRIBE")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("REGISTER")) {
        route(REGISTER);
        exit;
    }

    if (has_totag()) {
        route(WITHINDLG);
        exit;
    }

    if (is_method("INVITE")) {
        route(INVITE);
        exit;
    }

    if (is_method("ACK|CANCEL|BYE")) {
        route(RELAY);
        exit;
    }

    sl_send_reply("404", "Not Found");
    exit;
}

event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();
    if (ws_handle_handshake()) {
        exit;
    }
    xhttp_reply("404", "Not Found", "", "");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection closed\n");
}

route[REGISTER] {
    if (!auth_check("$td", "extensions", "1")) {
        auth_challenge("$td", "0");
        exit;
    }
    fix_nated_register();
    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

route[INVITE] {
    if (!auth_check("$td", "extensions", "1")) {
        auth_challenge("$td", "0");
        exit;
    }

    record_route();
    rtpproxy_offer();

    $ru = "sip:" + $rU + "@" + $td;

    if (!lookup("location")) {
        sl_send_reply("404", "User Not Found");
        exit;
    }

    t_on_reply("MANAGE_REPLY");
    t_on_failure("MANAGE_FAILURE");

    route(RELAY);
    exit;
}

route[WITHINDLG] {
    if (!loose_route()) {
        sl_send_reply("404", "Not here");
        exit;
    }
    if (is_method("BYE")) {
        rtpproxy_destroy();
    }
    route(RELAY);
    exit;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route[MANAGE_REPLY] {
    if (status =~ "18[03456789]|2[0-9][0-9]") {
        rtpproxy_answer();
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) exit;
}
