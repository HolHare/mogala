#!KAMAILIO

#!subst "/DBURL/mysql:\/\/mogala_user:DBPASS@mogala-mysql\/mogala/"

# Backend API for dial plan outbound resolution (localhost)
#!define BACKEND_HOST "127.0.0.1"
#!define BACKEND_PORT "8080"

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=yes
children=4

# Required for WebSocket HTTP upgrade which has no Content-Length header
tcp_accept_no_cl=yes

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tcp:0.0.0.0:8880

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "path.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "db_mysql.so"
loadmodule "sqlops.so"
loadmodule "nathelper.so"
loadmodule "rtpproxy.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "dialog.so"
loadmodule "acc.so"

modparam("usrloc", "db_url", "DBURL")
modparam("usrloc", "db_mode", 2)
modparam("usrloc", "use_domain", 0)
modparam("auth_db", "db_url", "DBURL")
modparam("auth_db", "password_column", "sip_password")
modparam("auth_db", "load_credentials", "")
modparam("auth_db", "user_column", "extension")
modparam("auth_db", "domain_column", "tenant_id")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "use_domain", 0)
modparam("nathelper", "received_avp", "$avp(RECEIVED)")
modparam("rtpproxy", "rtpproxy_sock", "udp:172.18.0.1:7722")
modparam("rr", "enable_full_lr", 1)
modparam("registrar", "received_avp", "$avp(RECEIVED)")
modparam("registrar", "use_path", 1)
modparam("path", "use_received", 1)
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)
modparam("websocket", "sub_protocols", 1)
modparam("dialog", "db_mode", 0)
modparam("acc", "db_url", "DBURL")
modparam("acc", "db_flag", 1)
modparam("acc", "cdr_enable", 1)
modparam("acc", "cdrs_table", "cdr_logs")
modparam("acc", "cdr_start_id", "start_time")
modparam("acc", "cdr_end_id", "end_time")
modparam("acc", "cdr_duration_id", "duration")
modparam("acc", "cdr_extra", "caller=$dlg_var(caller);callee=$dlg_var(callee)")

# sqlops connection for dial plan lookups
modparam("sqlops", "sqlcon", "mogaladb=>DBURL")

request_route {
    if (proto == WS || proto == WSS) {
        route(WS_MSG);
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }
    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200","Keepalive");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        exit;
    }
    if (is_method("NOTIFY|SUBSCRIBE")) {
        sl_send_reply("200", "OK");
        exit;
    }
    if (is_method("REGISTER")) {
        route(REGISTER);
        exit;
    }
    if (has_totag()) {
        route(WITHINDLG);
        exit;
    }
    if (is_method("INVITE")) {
        route(INVITE);
        exit;
    }
    if (is_method("ACK|CANCEL|BYE")) {
        route(RELAY);
        exit;
    }
    sl_send_reply("404", "Not Found");
    exit;
}

route[WS_MSG] {
    force_rport();

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }
    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200","Keepalive");
        exit;
    }
    if (!sanity_check("1024", "6")) {
        xlog("L_WARN", "Malformed WS SIP message from $si:$sp\n");
        exit;
    }
    if (is_method("NOTIFY|SUBSCRIBE")) {
        sl_send_reply("200", "OK");
        exit;
    }
    if (is_method("REGISTER")) {
        add_path_received();
        xlog("L_INFO", "WS REGISTER from $si:$sp ext=$tU contact=$ct\n");
        route(REGISTER);
        exit;
    }
    if (has_totag()) {
        route(WITHINDLG);
        exit;
    }
    if (is_method("INVITE")) {
        xlog("L_INFO", "WS INVITE from $si:$sp $fU -> $rU\n");
        route(INVITE);
        exit;
    }
    if (is_method("ACK|CANCEL|BYE")) {
        xlog("L_INFO", "WS $rm from $si:$sp\n");
        route(RELAY);
        exit;
    }
    sl_send_reply("404", "Not Found");
    exit;
}

event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket") {
        if (ws_handle_handshake()) {
            exit;
        }
        xhttp_reply("400", "Bad Request", "", "");
        exit;
    }
    set_reply_close();
    set_reply_no_connect();
    xhttp_reply("404", "Not Found", "", "");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection closed from $si:$sp\n");
}

route[REGISTER] {
    if (!auth_check("$td", "extensions", "1")) {
        auth_challenge("$td", "0");
        exit;
    }
    fix_nated_register();
    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

route[INVITE] {
    if (!auth_check("$td", "extensions", "1")) {
        auth_challenge("$td", "0");
        exit;
    }
    record_route();
    if (proto != WS && proto != WSS) {
        rtpproxy_offer();
    }

    # Try to route to a locally registered extension first
    $ru = "sip:" + $rU + "@" + $td;
    if (lookup("location")) {
        # WS callee: contact has .invalid host — route via the stored WS connection
        if ($(ru{uri.host}) =~ "invalid$" && $avp(RECEIVED) != $null) {
            $var(ws_tp) = $(ru{uri.param,transport});
            if ($var(ws_tp) == "") $var(ws_tp) = "ws";
            $du = "sip:" + $avp(RECEIVED) + ";transport=" + $var(ws_tp);
        }
        xlog("L_INFO", "INVITE $fU -> $tU routed locally to $ru du=$du (proto=$pr)\n");
        dlg_manage();
        $dlg_var(caller) = $fU;
        $dlg_var(callee) = $tU;
        t_on_reply("MANAGE_REPLY");
        t_on_failure("MANAGE_FAILURE");
        route(RELAY);
        exit;
    }

    # Callee not registered locally — try outbound via dial plan
    xlog("L_INFO", "INVITE $fU -> $tU: no local registration, checking dial plan\n");
    route(OUTBOUND);
    exit;
}

# OUTBOUND: match callee against dial_plan_rules and route via SIP trunk
# Uses kamailio sqlops module: results in $dbr(dp=>[row,col]), row count $dbr(dp=>rows)
route[OUTBOUND] {
    # cols: 0=host 1=port 2=username 3=password 4=strip_digits 5=prepend 6=pattern
    sql_query("mogaladb",
        "SELECT st.host, st.port, COALESCE(st.username,''), COALESCE(st.password,''), dr.strip_digits, dr.prepend, dr.pattern "
        "FROM dial_plan_rules dr "
        "JOIN dial_plans dp ON dp.id = dr.dial_plan_id "
        "JOIN sip_trunks st ON st.id = dr.trunk_id "
        "WHERE dr.tenant_id = '$td' AND dr.active = 1 AND dp.active = 1 AND st.active = 1 "
        "ORDER BY dr.priority ASC",
        "dp");

    if ($dbr(dp=>rows) <= 0) {
        xlog("L_WARN", "OUTBOUND no dial plan rules for tenant $td, rejecting $rU\n");
        sql_result_free("dp");
        sl_send_reply("404", "No Route");
        exit;
    }

    $var(matched) = 0;
    $var(i) = 0;
    while ($var(matched) == 0 && $var(i) < $dbr(dp=>rows)) {
        $var(pattern)     = $dbr(dp=>[$var(i),6]);
        $var(number)      = $rU;

        # Prefix match: "+" or "*" matches all; otherwise match by prefix
        if ($var(pattern) == "+" || $var(pattern) == "*" ||
            $(var(number){s.substr,0,$(var(pattern){s.len})}) == $var(pattern)) {

            $var(trunk_host)  = $dbr(dp=>[$var(i),0]);
            $var(trunk_port)  = $dbr(dp=>[$var(i),1]);
            $var(trunk_user)  = $dbr(dp=>[$var(i),2]);
            $var(strip)       = (int) $dbr(dp=>[$var(i),4]);
            $var(prepend)     = $dbr(dp=>[$var(i),5]);

            # Apply digit transformation
            if ($var(strip) > 0) {
                $var(number) = $(var(number){s.substr,$var(strip),0});
            }
            if ($var(prepend) != "") {
                $var(number) = $var(prepend) + $var(number);
            }

            xlog("L_INFO", "OUTBOUND dial plan match: $rU -> $var(trunk_host):$var(trunk_port) as $var(number)\n");

            $ru = "sip:" + $var(number) + "@" + $var(trunk_host) + ":" + $var(trunk_port);
            $du = "sip:" + $var(trunk_host) + ":" + $var(trunk_port);

            sql_result_free("dp");

            dlg_manage();
            $dlg_var(caller) = $fU;
            $dlg_var(callee) = $var(number);
            t_on_reply("MANAGE_REPLY");
            t_on_failure("MANAGE_FAILURE");
            route(RELAY);
            $var(matched) = 1;
        }
        $var(i) = $var(i) + 1;
    }

    if ($var(matched) == 0) {
        sql_result_free("dp");
        xlog("L_WARN", "OUTBOUND no dial plan route for $rU (tenant $td)\n");
        sl_send_reply("404", "No Route");
        exit;
    }
}

route[WITHINDLG] {
    xlog("L_INFO", "WITHINDLG $rm $fU->$tU ru=$ru\n");
    if (!loose_route()) {
        sl_send_reply("404", "Not here");
        exit;
    }
    # WS callee BYE/re-INVITE: R-URI is the .invalid contact — re-resolve via
    # usrloc to get the actual WS connection and set $du directly.
    if ($(ru{uri.host}) =~ "invalid$") {
        $var(ws_tp) = $(ru{uri.param,transport});
        if ($var(ws_tp) == "") $var(ws_tp) = "ws";
        $ru = "sip:" + $tU + "@" + $td;
        if (lookup("location") && $avp(RECEIVED) != $null) {
            $du = "sip:" + $avp(RECEIVED) + ";transport=" + $var(ws_tp);
        }
    }
    if (is_method("BYE") && proto != WS && proto != WSS) {
        rtpproxy_destroy();
    }
    route(RELAY);
    exit;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route[MANAGE_REPLY] {
    xlog("L_INFO", "Reply $rs from $si:$sp for $rm $fU->$tU\n");
    if (proto != WS && proto != WSS && status =~ "18[03456789]|2[0-9][0-9]") {
        rtpproxy_answer();
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) exit;
}
