events {}
http {
    server {
        listen 443 ssl;
        ssl_certificate /certs/cert.pem;
        ssl_certificate_key /certs/key.pem;

        location /auth/ {
            proxy_pass http://mogala-backend:8080/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://mogala-backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws {
            proxy_pass http://mogala-kamailio:8880;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location /dbadmin/ {
            auth_basic "Database Admin";
            auth_basic_user_file /etc/nginx/htpasswd;
            proxy_pass http://mogala-adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect / /dbadmin/;
        }

        location / {
            proxy_pass http://mogala-frontend:80;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
