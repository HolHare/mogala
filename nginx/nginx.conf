events {}
http {
    # Use Docker's internal DNS — resolves upstreams at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 443 ssl;
        ssl_certificate /certs/cert.pem;
        ssl_certificate_key /certs/key.pem;

        location /auth/ {
            set $backend http://mogala-backend:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $backend http://mogala-backend:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws {
            set $kamailio http://mogala-kamailio:8880;
            proxy_pass $kamailio;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location / {
            set $frontend http://mogala-frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
