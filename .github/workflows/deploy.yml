name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Go backend
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/backend:latest

      - name: Build and push React frontend
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/frontend:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        timeout-minutes: 10
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/nginx:latest

      - name: Build and push Kamailio
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./kamailio
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/kamailio:latest

      - name: Build and push Asterisk
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./asterisk
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/asterisk:latest


      - name: Notify build failure
        if: failure()
        run: |
          echo "::error::Build failed on commit ${{ github.sha }} by ${{ github.actor }}"

  deploy:
    needs: build
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        timeout-minutes: 5
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/mogala"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 8m
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}/mogala

            # Write .env so docker compose always has correct credentials
            cat > .env << ENVEOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EXTERNAL_IP=${{ secrets.VPS_IP }}
            SUPERADMIN_EMAIL=${{ secrets.SUPERADMIN_EMAIL }}
            SUPERADMIN_PASSWORD=${{ secrets.SUPERADMIN_PASSWORD }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            PHONE_OTP_WEBHOOK_URL=${{ secrets.PHONE_OTP_WEBHOOK_URL }}
            ENVEOF
            sed -i 's/^ *//' .env

            # Generate self-signed SSL cert if missing
            mkdir -p certs
            if [ ! -f certs/cert.pem ] || [ ! -f certs/key.pem ]; then
              openssl req -x509 -newkey rsa:2048 \
                -keyout certs/key.pem -out certs/cert.pem \
                -days 365 -nodes -subj "/CN=${{ secrets.VPS_IP }}"
              echo "SSL cert generated"
            fi

            docker-compose pull
            docker-compose up -d --remove-orphans

            # Wait for MySQL to be ready
            echo "Waiting for MySQL..."
            for i in $(seq 1 30); do
              docker exec -e MYSQL_PWD="" mogala-mysql mysqladmin ping -uroot --silent 2>/dev/null && break
              docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" mogala-mysql mysqladmin ping -uroot --silent 2>/dev/null && break
              sleep 2
            done

            # Find working root password — fall back to skip-grant-tables recovery
            echo "--- MySQL diagnostics ---"
            ROOT_CONNECTED=false
            ROOT_PW=""
            if docker exec -e MYSQL_PWD="" mogala-mysql mysql -uroot -e "SELECT 'root_empty_pw';" 2>/dev/null; then
              ROOT_CONNECTED=true
              ROOT_PW=""
              echo "Root: EMPTY password"
            elif docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" mogala-mysql mysql -uroot -e "SELECT 'root_secret_pw';" 2>/dev/null; then
              ROOT_CONNECTED=true
              ROOT_PW="${{ secrets.MYSQL_ROOT_PASSWORD }}"
              echo "Root: secret password matches"
            else
              echo "Root: unknown password — running skip-grant-tables recovery"

              # Stop MySQL, start a recovery instance on the same volume
              docker stop mogala-mysql || true
              docker rm -f mogala-mysql-recover 2>/dev/null || true
              MYSQL_VOL=$(docker volume ls --format '{{.Name}}' | grep mysql_data | head -1)
              echo "Using volume: $MYSQL_VOL"
              docker run -d --name mogala-mysql-recover \
                -v "${MYSQL_VOL}:/var/lib/mysql" \
                mysql:8 --skip-grant-tables --skip-networking

              # Wait for recovery instance to accept connections
              for i in $(seq 1 30); do
                docker exec mogala-mysql-recover mysql -uroot -e "SELECT 1;" 2>/dev/null && break
                sleep 2
              done

              echo "Resetting root password via skip-grant-tables..."
              docker exec mogala-mysql-recover mysql -uroot -e "
                FLUSH PRIVILEGES;
                ALTER USER 'root'@'localhost' IDENTIFIED BY '${{ secrets.MYSQL_ROOT_PASSWORD }}';
                ALTER USER 'root'@'%' IDENTIFIED BY '${{ secrets.MYSQL_ROOT_PASSWORD }}';
                FLUSH PRIVILEGES;
              " 2>&1 && echo "Root reset OK" || echo "Root reset FAILED"

              docker stop mogala-mysql-recover && docker rm mogala-mysql-recover
              docker-compose up -d mysql

              # Wait for MySQL to come back
              for i in $(seq 1 30); do
                docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" mogala-mysql \
                  mysql -uroot -e "SELECT 1;" 2>/dev/null && break
                sleep 2
              done

              if docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" mogala-mysql \
                  mysql -uroot -e "SELECT 'root_recovered';" 2>/dev/null; then
                ROOT_CONNECTED=true
                ROOT_PW="${{ secrets.MYSQL_ROOT_PASSWORD }}"
                echo "Root password recovery successful"
              else
                echo "ERROR: Root recovery failed — manual intervention needed"
              fi
            fi

            if [ "$ROOT_CONNECTED" = "true" ]; then
              echo "Force-syncing all passwords..."
              docker exec -e MYSQL_PWD="$ROOT_PW" mogala-mysql mysql -uroot -e "
                ALTER USER 'root'@'localhost' IDENTIFIED BY '${{ secrets.MYSQL_ROOT_PASSWORD }}';
                ALTER USER 'root'@'%' IDENTIFIED BY '${{ secrets.MYSQL_ROOT_PASSWORD }}';
                CREATE USER IF NOT EXISTS 'mogala_user'@'%' IDENTIFIED BY '${{ secrets.MYSQL_PASSWORD }}';
                ALTER USER 'mogala_user'@'%' IDENTIFIED BY '${{ secrets.MYSQL_PASSWORD }}';
                GRANT ALL PRIVILEGES ON mogala.* TO 'mogala_user'@'%';
                FLUSH PRIVILEGES;
                SELECT user, host, plugin FROM mysql.user WHERE user IN ('root','mogala_user');
              " 2>&1 && echo "Password sync OK" || echo "ERROR: password sync failed"

              # Prime caching_sha2_password TCP cache so Adminer connects without RSA
              echo "--- Priming TCP cache for Adminer ---"
              docker exec -e MYSQL_PWD="${{ secrets.MYSQL_PASSWORD }}" mogala-mysql \
                mysql -h127.0.0.1 -P3306 -umogala_user --get-server-public-key mogala \
                -e "SELECT 'tcp_cache_primed';" 2>&1 \
                && echo "SUCCESS: Adminer should now connect with mogala_user / psalm51:12" \
                || echo "FAIL: mogala_user still cannot connect — check logs above"
            fi
            echo "--- End diagnostics ---"

            docker-compose ps

      - name: Notify deploy failure
        if: failure()
        run: |
          echo "::error::Deploy failed on commit ${{ github.sha }} — check VPS connectivity and docker-compose logs"
