name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Go backend
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/backend:latest

      - name: Build and push React frontend
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/frontend:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        timeout-minutes: 10
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/nginx:latest

      - name: Build and push Kamailio
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./kamailio
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/kamailio:latest

      - name: Build and push Asterisk
        uses: docker/build-push-action@v5
        timeout-minutes: 15
        with:
          context: ./asterisk
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/asterisk:latest

      - name: Build and push Adminer
        uses: docker/build-push-action@v5
        timeout-minutes: 10
        with:
          context: ./adminer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}/adminer:latest

      - name: Notify build failure
        if: failure()
        run: |
          echo "::error::Build failed on commit ${{ github.sha }} by ${{ github.actor }}"

  deploy:
    needs: build
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        timeout-minutes: 5
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/mogala"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 8m
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}/mogala

            # Write .env so docker compose always has correct credentials
            cat > .env << ENVEOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EXTERNAL_IP=${{ secrets.VPS_IP }}
            ENVEOF
            sed -i 's/^ *//' .env

            # Generate self-signed SSL cert if missing
            mkdir -p certs
            if [ ! -f certs/cert.pem ] || [ ! -f certs/key.pem ]; then
              openssl req -x509 -newkey rsa:2048 \
                -keyout certs/key.pem -out certs/cert.pem \
                -days 365 -nodes -subj "/CN=${{ secrets.VPS_IP }}"
              echo "SSL cert generated"
            fi

            docker-compose pull
            docker-compose up -d --remove-orphans

            # Wait for MySQL to be ready
            echo "Waiting for MySQL..."
            for i in $(seq 1 30); do
              docker exec mogala-mysql mysqladmin ping -uroot --password="" --silent 2>/dev/null && break
              docker exec mogala-mysql mysqladmin ping -uroot -p"${{ secrets.MYSQL_ROOT_PASSWORD }}" --silent 2>/dev/null && break
              sleep 2
            done

            # Detect which root password works and sync all passwords
            echo "--- MySQL diagnostics ---"
            if docker exec mogala-mysql mysql -uroot --password="" -e "SELECT 'root_empty_password_works';" 2>/dev/null; then
              echo "Root has EMPTY password — setting correct passwords now"
              docker exec mogala-mysql mysql -uroot --password="" -e "
                ALTER USER 'root'@'localhost' IDENTIFIED BY '${{ secrets.MYSQL_ROOT_PASSWORD }}';
                ALTER USER 'root'@'%' IDENTIFIED BY '${{ secrets.MYSQL_ROOT_PASSWORD }}';
                ALTER USER 'mogala_user'@'%' IDENTIFIED BY '${{ secrets.MYSQL_PASSWORD }}';
                FLUSH PRIVILEGES;
                SELECT user, host, plugin FROM mysql.user WHERE user IN ('root','mogala_user');
              "
            elif docker exec mogala-mysql mysql -uroot -p"${{ secrets.MYSQL_ROOT_PASSWORD }}" -e "SELECT 'root_secret_password_works';" 2>/dev/null; then
              echo "Root password matches secret — syncing mogala_user"
              docker exec mogala-mysql mysql -uroot -p"${{ secrets.MYSQL_ROOT_PASSWORD }}" -e "
                ALTER USER 'mogala_user'@'%' IDENTIFIED BY '${{ secrets.MYSQL_PASSWORD }}';
                FLUSH PRIVILEGES;
                SELECT user, host, plugin FROM mysql.user WHERE user IN ('root','mogala_user');
              "
            else
              echo "ERROR: Cannot connect to MySQL as root with any known password"
            fi
            echo "--- End diagnostics ---"

            docker-compose ps

      - name: Notify deploy failure
        if: failure()
        run: |
          echo "::error::Deploy failed on commit ${{ github.sha }} — check VPS connectivity and docker-compose logs"
