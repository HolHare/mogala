[general]
static=yes
writeprotect=no

[default]
exten => _X.,1,NoOp(Call to ${EXTEN})
 same => n,Dial(SIP/${EXTEN}@kamailio)
 same => n,Hangup()

[from-kamailio]
exten => _X.,1,NoOp(Incoming call to ${EXTEN})
 same => n,Dial(SIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

[from-trunk]
exten => _X.,1,NoOp(Incoming from trunk to ${EXTEN})
 same => n,Dial(SIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()
